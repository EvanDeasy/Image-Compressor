<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Compress images client-side. No upload, no server.">
<title>Image Compressor</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 2rem; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 1.5rem;
    width: 100%;
    max-width: 520px;
    margin-bottom: 1rem;
  }
  #drop-zone {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    color: #555;
    font-size: 0.95rem;
  }
  #drop-zone.drag-over { border-color: #555; background: #f0f0f0; }
  #drop-zone input { display: none; }
  #drop-zone label { cursor: pointer; font-weight: 500; text-decoration: underline; }
  .section-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-bottom: 0.75rem;
  }
  .quality-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  input[type=range] {
    flex: 1;
    accent-color: #1a1a1a;
    height: 4px;
    cursor: pointer;
  }
  #quality-val {
    font-size: 1rem;
    font-weight: 600;
    min-width: 36px;
    text-align: right;
  }
  .format-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .fmt-btn {
    flex: 1;
    padding: 0.4rem 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .fmt-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
  .stat-box {
    background: #f7f7f7;
    border-radius: 6px;
    padding: 0.75rem;
    text-align: center;
  }
  .stat-label { font-size: 0.7rem; color: #888; margin-bottom: 0.2rem; }
  .stat-val { font-size: 1.05rem; font-weight: 600; }
  .stat-val.green { color: #1a7a3e; }
  #preview-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
  .preview-box { text-align: center; }
  .preview-box img {
    width: 100%;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    display: block;
    max-height: 180px;
    object-fit: contain;
    background: #f0f0f0;
  }
  .preview-label { font-size: 0.75rem; color: #888; margin-top: 0.3rem; }
  #download-btn {
    display: block;
    width: 100%;
    padding: 0.75rem;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.15s;
  }
  #download-btn:hover { background: #333; }
  #download-btn:disabled { background: #ccc; cursor: not-allowed; }
  .hidden { display: none !important; }
  #install-btn {
    font-size: 0.8rem;
    background: none;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    color: #555;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<h1>Image Compressor</h1>
<p class="subtitle">Client-side only. Nothing is uploaded anywhere.</p>

<div class="card">
  <div id="drop-zone">
    <p>Drag &amp; drop an image here</p>
    <p style="margin: 0.4rem 0; font-size:0.8rem; color:#aaa;">or</p>
    <label for="file-input">Browse file</label>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp">
  </div>
</div>

<div class="card" id="controls-card" style="display:none">
  <div class="section-label">Output format</div>
  <div class="format-row">
    <button class="fmt-btn active" data-fmt="image/jpeg">JPEG</button>
    <button class="fmt-btn" data-fmt="image/webp">WebP</button>
  </div>

  <div style="margin-top:1.25rem">
    <div class="section-label">Quality</div>
    <div class="quality-row">
      <span style="font-size:0.8rem;color:#888">Low</span>
      <input type="range" id="quality" min="1" max="100" value="75" step="1">
      <span style="font-size:0.8rem;color:#888">High</span>
      <span id="quality-val">75</span>
    </div>
  </div>
</div>

<div class="card" id="results-card" style="display:none">
  <div class="section-label">Results</div>
  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Original</div>
      <div class="stat-val" id="stat-original">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Compressed</div>
      <div class="stat-val" id="stat-compressed">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Reduction</div>
      <div class="stat-val green" id="stat-reduction">—</div>
    </div>
  </div>

  <div id="preview-row" style="margin-top:1rem">
    <div class="preview-box">
      <img id="preview-original" src="" alt="Original">
      <div class="preview-label">Original</div>
    </div>
    <div class="preview-box">
      <img id="preview-compressed" src="" alt="Compressed">
      <div class="preview-label">Compressed</div>
    </div>
  </div>

  <button id="download-btn" disabled>Download compressed image</button>
</div>

<button id="install-btn" class="hidden">Install app</button>

<canvas id="canvas" style="display:none"></canvas>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const qualitySlider = document.getElementById('quality');
const qualityVal = document.getElementById('quality-val');
const controlsCard = document.getElementById('controls-card');
const resultsCard = document.getElementById('results-card');
const downloadBtn = document.getElementById('download-btn');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const installBtn = document.getElementById('install-btn');

let currentFile = null;
let currentObjectURL = null;
let selectedFormat = 'image/jpeg';

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });
qualitySlider.addEventListener('input', () => {
  qualityVal.textContent = qualitySlider.value;
  if (currentFile) compress();
});

document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFormat = btn.dataset.fmt;
    if (currentFile) compress();
  });
});

function loadFile(file) {
  currentFile = file;
  controlsCard.style.display = '';
  resultsCard.style.display = '';
  document.getElementById('preview-original').src = URL.createObjectURL(file);
  compress();
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function compress() {
  const img = new Image();
  const url = URL.createObjectURL(currentFile);
  img.onload = () => {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (selectedFormat === 'image/jpeg') {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    const quality = parseInt(qualitySlider.value) / 100;
    canvas.toBlob(blob => {
      if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
      currentObjectURL = URL.createObjectURL(blob);

      document.getElementById('preview-compressed').src = currentObjectURL;
      document.getElementById('stat-original').textContent = fmtSize(currentFile.size);
      document.getElementById('stat-compressed').textContent = fmtSize(blob.size);

      const reduction = Math.round((1 - blob.size / currentFile.size) * 100);
      const reductionEl = document.getElementById('stat-reduction');
      reductionEl.textContent = (reduction > 0 ? '-' : '') + reduction + '%';
      reductionEl.className = 'stat-val ' + (reduction > 0 ? 'green' : '');

      downloadBtn.disabled = false;
      downloadBtn.onclick = () => {
        const ext = selectedFormat === 'image/webp' ? 'webp' : 'jpg';
        const baseName = currentFile.name.replace(/\.[^.]+$/, '');
        const a = document.createElement('a');
        a.href = currentObjectURL;
        a.download = baseName + '_compressed.' + ext;
        a.click();
      };
    }, selectedFormat, quality);
  };
  img.src = url;
}

// PWA manifest injection
const manifestData = {
  name: "Image Compressor",
  short_name: "Compressor",
  start_url: ".",
  display: "standalone",
  background_color: "#f5f5f5",
  theme_color: "#ffffff",
  icons: [{ src: "https://via.placeholder.com/192", sizes: "192x192", type: "image/png" }]
};
const blob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
document.getElementById('manifest-link').href = URL.createObjectURL(blob);

// Service worker registration
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'imgcomp-v1';
    const ASSETS = [self.location.pathname];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(() => {});
}

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.remove('hidden');
});
installBtn.addEventListener('click', () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; installBtn.classList.add('hidden'); }
});
</script>
</body>
</html>
